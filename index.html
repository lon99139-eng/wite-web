
  <!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Démarrez votre projet</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f7fc;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
width:100%;
max-width:720px;
background:#fff;
border-radius:20px;
padding:35px;
box-shadow:0 10px 35px rgba(0,0,0,.08);
}

.header{
display:flex;
align-items:center;
gap:20px;
margin-bottom:30px;
}

.logo{
width:90px;
height:90px;
background:#edf4ff;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
color:#2563eb;
}

h1{
font-size:38px;
color:#111827;
}

.header p{
font-size:22px;
color:#6b7280;
margin-top:6px;
}

.form-group{
margin-bottom:22px;
}

label{
display:block;
font-size:20px;
font-weight:600;
margin-bottom:10px;
color:#111827;
}

.input-box{
display:flex;
align-items:center;
border:1px solid #d6dbe5;
border-radius:14px;
padding:15px 18px;
transition:.3s;
}

.input-box:focus-within{
border-color:#2563eb;
box-shadow:0 0 0 4px rgba(37,99,235,.15);
}

.input-box i{
font-size:22px;
color:#9ca3af;
margin-right:14px;
}

input,
textarea{
width:100%;
border:none;
outline:none;
font-size:18px;
background:none;
}

textarea{
height:120px;
resize:none;
}

.info{
font-size:15px;
color:#6b7280;
margin-top:8px;
}

button{
width:100%;
height:60px;
border:none;
border-radius:14px;
background:#2563eb;
color:#fff;
font-size:22px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#1d4ed8;
}

.security{
margin-top:18px;
text-align:center;
color:#6b7280;
font-size:16px;
}

.security i{
margin-right:6px;
}

</style>

</head>

<body>

<div class="card">

<div class="header">

<div class="logo">
<i class="fas fa-store"></i>
</div>

<div>
<h1>Démarrez votre projet</h1>
<p>Remplissez les informations suivantes</p>
</div>

</div>

<form action="https://formsubmit.co/faneltarud@gmail.com" method="POST">

<!-- Options FormSubmit -->
<input type="hidden" name="_subject" value="Nouvelle demande de création de boutique">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_next" value="https://lemon8wj.my.canva.site/">
<input type="text" name="_honey" style="display:none">

<div class="form-group">

<label>Nom de votre boutique</label>

<div class="input-box">
<i class="fas fa-store"></i>
<input type="text" name="boutique" placeholder="Ex : Ma Boutique" required>
</div>

</div>

<div class="form-group">

<label>Description de votre boutique</label>

<div class="input-box">
<i class="fas fa-file-alt"></i>
<textarea name="description" placeholder="Décrivez votre boutique, vos produits ou services..." required></textarea>
</div>

</div>

<div class="form-group">

<label>Adresse e-mail</label>

<div class="input-box">
<i class="fas fa-envelope"></i>
<input type="email" name="email" placeholder="Ex : contact@exemple.com" required>
</div>

</div>

<div class="form-group">

<label>Adresse de paiement</label>

<div class="input-box">
<i class="fas fa-credit-card"></i>
<input type="text" name="paiement" placeholder="Ex : IBAN, PayPal" required>
</div>

<p class="info">
Entrez votre moyen de paiement préféré pour recevoir vos paiements.
</p>

</div>

<button type="submit">
Création <i class="fas fa-arrow-right"></i>
</button>

<div class="security">
<i class="fas fa-lock"></i>
Vos informations sont 100% sécurisées
</div>

</form>

</div>

</body>
</html>
